<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Nest – Personal Vault</title>
  <meta name="description"
    content="Your personal vault for certificates, photos, and important documents – all in one place." />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6c63ff" />
  <link rel="icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- ════════════════════ SIDEBAR ════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <img src="icon-192.png" class="logo-img" alt="File Nest logo" />
        <span class="logo-text">File Nest</span>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle" onclick="closeSidebar()" title="Collapse sidebar">‹</button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">NAVIGATION</div>

      <button class="nav-btn active" id="navHome" onclick="navigateTo('home')">
        <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
      </button>
      <button class="nav-btn" id="navRecent" onclick="navigateTo('recent')">
        <span class="nav-icon">🕐</span><span class="nav-label">Recent Files</span>
      </button>
      <button class="nav-btn" id="navFavorites" onclick="navigateTo('favorites')">
        <span class="nav-icon">⭐</span><span class="nav-label">Favorites</span>
      </button>

      <div class="nav-section-label" style="margin-top:20px">FOLDERS</div>
      <div id="sidebarFolderList"></div>

      <button class="new-folder-btn" onclick="openCreateFolderModal()">
        <span>＋</span> New Folder
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="storage-bar-label">
        <span>Storage Used</span>
        <span id="storageUsedLabel">0 KB</span>
      </div>
      <div class="storage-bar-track">
        <div class="storage-bar-fill" id="storageFill" style="width:0%"></div>
      </div>
    </div>
  </aside>

  <!-- Mobile sidebar backdrop -->
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

  <!-- ════════════════════ MAIN ════════════════════ -->
  <div class="main-wrapper" id="mainWrapper">

    <!-- TOP BAR -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-hamburger" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
        <div class="breadcrumb" id="breadcrumb">
          <span onclick="navigateTo('home')" class="bc-home">🏠 Home</span>
        </div>
      </div>

      <div class="topbar-center">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search files and folders…"
            oninput="handleSearch(this.value)" />
          <button class="search-clear" id="searchClearBtn" onclick="clearSearch()" style="display:none">✕</button>
        </div>
      </div>

      <div class="topbar-right">
        <div class="view-toggles">
          <button class="view-btn active" id="viewLarge" title="Large icons" onclick="setView('large')">⊞</button>
          <button class="view-btn" id="viewMedium" title="Medium icons" onclick="setView('medium')">⊟</button>
          <button class="view-btn" id="viewSmall" title="Small icons (list)" onclick="setView('small')">≡</button>
        </div>

        <div class="sort-controls">
          <select id="sortField" onchange="applySort()" title="Sort by">
            <option value="name">Name</option>
            <option value="date">Date</option>
            <option value="size">Size</option>
            <option value="type">Type</option>
          </select>
          <button class="sort-dir-btn" id="sortDirBtn" title="Toggle sort direction"
            onclick="toggleSortDir()">↑</button>
        </div>

        <button class="icon-btn" onclick="openCreateFolderModal()" title="New Folder">📁＋</button>
        <button class="icon-btn" id="uploadBtnTop" onclick="triggerUpload()" title="Upload File" style="display:none">⬆ Upload</button>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <main class="content" id="content">
      <!-- Rendered by JS -->
    </main>
  </div>

  <!-- ════════════════════ MODALS ════════════════════ -->

  <!-- Create / Edit Folder Modal -->
  <div class="modal-overlay" id="folderModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="folderModalTitle">New Folder</h2>
        <button class="modal-close" onclick="closeFolderModal()">✕</button>
      </div>
      <div class="modal-body">
        <label class="form-label">Folder Name</label>
        <input class="form-input" type="text" id="folderNameInput" placeholder="e.g. Work Certificates" maxlength="60" />
        <label class="form-label" style="margin-top:16px">Folder Type</label>
        <div class="type-grid" id="typeGrid"></div>
        <label class="form-label" style="margin-top:16px">Icon</label>
        <div class="emoji-picker" id="emojiPicker"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeFolderModal()">Cancel</button>
        <button class="btn-primary" onclick="saveFolderModal()">Save</button>
      </div>
    </div>
  </div>

  <!-- Rename Modal -->
  <div class="modal-overlay" id="renameModal">
    <div class="modal modal--sm">
      <div class="modal-header">
        <h2>Rename</h2>
        <button class="modal-close" onclick="closeRenameModal()">✕</button>
      </div>
      <div class="modal-body">
        <label class="form-label">New Name</label>
        <input class="form-input" type="text" id="renameInput" placeholder="Enter new name" maxlength="120" />
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeRenameModal()">Cancel</button>
        <button class="btn-primary" onclick="confirmRename()">Rename</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal modal--sm">
      <div class="modal-header">
        <h2>Confirm Delete</h2>
        <button class="modal-close" onclick="closeDeleteModal()">✕</button>
      </div>
      <div class="modal-body">
        <p id="deleteModalMsg">Are you sure you want to delete this item?</p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn-danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <!-- File Viewer / Lightbox -->
  <div class="lightbox-overlay" id="lightbox">
    <div class="lightbox-container">
      <div class="lightbox-header">
        <span id="lightboxFileName" class="lb-title"></span>
        <div style="display:flex;gap:8px">
          <button class="lb-btn" onclick="downloadCurrentFile()" title="Download">⬇ Download</button>
          <button class="lb-close" onclick="closeLightbox()">✕</button>
        </div>
      </div>
      <div class="lightbox-body" id="lightboxBody"></div>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="ctx-menu" id="ctxMenu"></div>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Hidden file input -->
  <input type="file" id="fileInput" multiple style="display:none" onchange="handleFileUpload(event)" />

  <!-- PWA Install Banner -->
  <div class="install-banner" id="installBanner">
    <p>🪺 <strong>File Nest</strong> can be installed to your home screen for quick access.</p>
    <div class="install-banner-btns">
      <button class="btn-primary" onclick="installApp()">Install App</button>
      <button class="btn-secondary" onclick="dismissInstall()">Not Now</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
